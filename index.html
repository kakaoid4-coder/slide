<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>복지 상담 사례 브리핑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f3f4f6;
            overflow: hidden;
        }

        .slide {
            display: none;
            height: 100vh;
            width: 100vw;
            animation: fadeIn 0.5s ease-in-out;
        }

        .slide.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .progress-bar {
            height: 4px;
            background: #e5e7eb;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 50;
        }

        .progress-inner {
            height: 100%;
            background: #2563eb;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="progress-bar">
        <div id="progressInner" class="progress-inner" style="width: 0%"></div>
    </div>

    <!-- Navigation Buttons -->
    <div class="fixed bottom-8 right-8 flex gap-4 z-50">
        <button onclick="prevSlide()" class="w-12 h-12 rounded-full bg-white shadow-lg flex items-center justify-center text-blue-600 hover:bg-blue-50 transition-colors">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button onclick="nextSlide()" class="w-12 h-12 rounded-full bg-blue-600 shadow-lg flex items-center justify-center text-white hover:bg-blue-700 transition-colors">
            <i class="fas fa-chevron-right"></i>
        </button>
    </div>

    <div id="slideContainer">
        <!-- Slides will be injected here -->
    </div>

    <script>
        const data = [
            {
                "연번": "1",
                "일자(시작)": "2026-04-03",
                "성명": "강연임",
                "나이": "83",
                "권역": "순창읍",
                "장애유형": "시각",
                "장애정도": "심하지 않은 장애",
                "주요내용": "영유아기 고열로 인한 시청각 장애와 고혈압 당뇨 치매 등 다수의 기저질환을 앓고 있음.\n하체 근력이 약해 낙상 위험이 매우 크며 화장실 내 안전손잡이 설치가 가장 시급한 상황임. 차상위계층으로 경제적 여유가 부족하며 현재 주 5일 요양보호사의 돌봄을 받고 있음. 최우선으로 화장실 안전손잡이를 지원하기로 함. 복지관 등록을 통해 정기적인 안전 모니터링 체계를 구축하고 추가 복지 혜택을 위한 장애 재판정을 제안함."
            },
            {
                "연번": "2",
                "일자(시작)": "2026-04-03",
                "성명": "강갑순",
                "나이": "81",
                "권역": "인계면",
                "장애유형": "청각",
                "장애정도": "심한 장애",
                "주요내용": "일상생활은 가능하나 큰아들의 이혼 이후 손주 양육과 가사 부담이 함께 있어 신체적.정서적 부담이 큰 상황임. 가정편의시설설치는 자녀분이 해주기로 함. 만성질환과 고령으로 지속적인 모니터링 필요함"
            },
            {
                "연번": "3",
                "일자(시작)": "2026-04-07",
                "성명": "설영자",
                "나이": "83",
                "권역": "풍산면",
                "장애유형": "지체",
                "장애정도": "심하지 않은 장애",
                "주요내용": "거주 주택 내 날개미 발생으로 심리적 불안과 스트레스를 호소하여 사례회의를 통해 방역업체를 연계하여 방역을 1회 실시함. 또한 노후화된 주택으로 인해 난방 효율이 저하되어 난방비 부담이 과중한 상황으로 향후 난방비 지원 연계를 계획함. 최근 열효율개선사업 신청을 시도하였으나 토지는 배우자 명의이며 가건물로 분류되어 신청이 불가한 상태임. 추후 지속적인 모니터링 계획"
            },
            {
                "연번": "4",
                "일자(시작)": "2026-04-17",
                "성명": "김명숙",
                "나이": "69",
                "권역": "유등면",
                "장애유형": "시각",
                "장애정도": "심하지 않은 장애",
                "주요내용": "전반적으로 건강 상태가 양호하며 시니어일자리 참여를 통해 규칙적인 일상생활을 유지하고 있음. 자녀들과의 교류 및 마을 주민들과의 관계도 유지되고 있어 사회적 고립 위험은 낮은 것으로 판단됨. 특이한 문제는 확인되지 않음"
            },
            {
                "연번": "5",
                "일자(시작)": "2026-04-17",
                "성명": "김재곤",
                "나 age": "79",
                "권역": "동계면",
                "장애유형": "지체",
                "장애정도": "심한 장애",
                "주요내용": "고혈압, 당뇨와 함께 하체 관절 통증으로 인해 보행에 어려움을 겪고 있음. 위암 완치 후 블루베리 농사를 계획할 정도로 근로 의욕과 삶에 대한 태도가 긍정적임. 다만 자가 주택과 토지 소유로 인해 기초생활수급자 선정에서 탈락하여 실제 경제적 형편이 매우 곤란한 상태임. 만성적인 통증 관리와 생활비 부족 문제를 해결하기 위해 복지관 이용을 통한 자원 연계를 추진하고 정기적인 안부 확인을 통해 지속적인 모니터링을 진행하기로 함."
            },
            {
                "연번": "6",
                "일자(시작)": "2026-04-17",
                "성명": "이경희",
                "나이": "63",
                "권역": "동계면",
                "장애유형": "지체",
                "장애정도": "심한 장애",
                "주요내용": "잦은 낙상 등 거동에 큰 불편을 겪고 있음. 아들이 부양의무자로 분류되어 공적 급여를 받지 못해 경제적 형편이 매우 어려우나, 깊은 신앙심을 바탕으로 긍정적인 삶의 태도를 유지하고 있음. 현재 가장 시급한 문제는 신체 기능 저하에도 불구하고 실외 화장실을 이용하고 있어 겨울철 낙상 등 안전사고 위험이 매우 높다는 점임. 안전한 주거 환경 조성을 위해 지자체 화장실 보수공사 지원 사업 등 최우선적인 자원 연계가 필요한 상황임."
            },
            {
                "연번": "7",
                "일자(시작)": "2026-04-17",
                "성명": "조삼순",
                "나이": "82",
                "권역": "동계면",
                "장애유형": "지체",
                "장애정도": "심하지 않은 장애",
                "주요내용": "척추 수술 이력과 만성질환으로 거동이 불편함. 경제적으로 여유가 있고 자녀들의 돌봄 지지체계가 강력하여 정서적 및 일상적으로 안정된 생활을 유지 중임. 현재 가장 시급한 문제는 안전사고 위험이 있는 현관 미닫이문 잠금장치 수리와 비상용 보행기 지원임. 주거 안전성을 높이기 위해 관련 자원 연계 가능성을 파악하고, 복지관 등록 후 정기적인 안부 전화로 지속적인 모니터링을 진행할 계획임."
            },
            {
                "연번": "8",
                "일자(시작)": "2026-04-23",
                "성명": "김상기",
                "나이": "52",
                "권역": "쌍치면",
                "장애유형": "뇌전증",
                "장애정도": "심하지 않은 장애",
                "주요내용": "잦은 뇌전증 발작과 손가락 부상으로 인해 청결 관리나 가사 등 일상생활 전반에 큰 어려움을 겪고 있음. 공공부조로 경제적 곤란은 덜한 편이나 최근 모친상 이후 심리적 상실감과 외로움이 깊어진 상태임. 가사 지원을 위해 현재 장애인 활동지원서비스를 신청하고 결과를 기다리는 중임."
            }
        ];

        let currentSlide = 0;
        const container = document.getElementById('slideContainer');

        function createIntroSlide() {
            const types = [...new Set(data.map(item => item.장애유형))];
            const regions = [...new Set(data.map(item => item.권역))];
            
            return `
                <div class="slide active items-center justify-center p-8 bg-gradient-to-br from-blue-600 to-indigo-800">
                    <div class="glass-card p-12 max-w-4xl w-full text-center">
                        <div class="mb-6 inline-block p-4 rounded-2xl bg-blue-100 text-blue-600">
                            <i class="fas fa-clipboard-list fa-3x"></i>
                        </div>
                        <h1 class="text-4xl font-bold text-gray-800 mb-4">2026년 4월 복지 상담 사례 브리핑</h1>
                        <p class="text-xl text-gray-600 mb-12">취약계층 안전 모니터링 및 자원 연계 현황</p>
                        
                        <div class="grid grid-cols-3 gap-6">
                            <div class="p-6 bg-blue-50 rounded-2xl">
                                <p class="text-sm text-blue-600 font-semibold mb-1">총 상담 건수</p>
                                <p class="text-3xl font-bold text-blue-900">${data.length}건</p>
                            </div>
                            <div class="p-6 bg-indigo-50 rounded-2xl">
                                <p class="text-sm text-indigo-600 font-semibold mb-1">상담 권역</p>
                                <p class="text-3xl font-bold text-indigo-900">${regions.length}개 면/읍</p>
                            </div>
                            <div class="p-6 bg-purple-50 rounded-2xl">
                                <p class="text-sm text-purple-600 font-semibold mb-1">평균 연령</p>
                                <p class="text-3xl font-bold text-purple-900">74세</p>
                            </div>
                        </div>
                        <div class="mt-12 text-sm text-gray-400">
                            방향키(← →)를 사용하거나 버튼을 눌러 상세 내용을 확인하세요.
                        </div>
                    </div>
                </div>
            `;
        }

        function createDataSlides() {
            return data.map((item, index) => `
                <div class="slide items-center justify-center p-8">
                    <div class="glass-card p-8 md:p-12 max-w-5xl w-full grid md:grid-cols-3 gap-8">
                        <!-- Profile Section -->
                        <div class="md:col-span-1 border-r border-gray-100 pr-8">
                            <div class="flex items-center gap-4 mb-8">
                                <div class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center text-2xl font-bold">
                                    ${item.성명[0]}
                                </div>
                                <div>
                                    <h2 class="text-2xl font-bold text-gray-800">${item.성명} <span class="text-sm font-normal text-gray-500">(${item.나이}세)</span></h2>
                                    <p class="text-blue-600 font-semibold">${item.권역}</p>
                                </div>
                            </div>
                            
                            <div class="space-y-4">
                                <div class="p-4 bg-gray-50 rounded-xl">
                                    <p class="text-xs text-gray-500 mb-1">장애 정보</p>
                                    <p class="font-semibold text-gray-700">${item.장애유형} / ${item.장애정도}</p>
                                </div>
                                <div class="p-4 bg-gray-50 rounded-xl">
                                    <p class="text-xs text-gray-500 mb-1">상담 일자</p>
                                    <p class="font-semibold text-gray-700">${item["일자(시작)"]}</p>
                                </div>
                                <div class="p-4 bg-gray-50 rounded-xl">
                                    <p class="text-xs text-gray-500 mb-1">관리 번호</p>
                                    <p class="font-semibold text-gray-700">CASE-${item.연번.padStart(3, '0')}</p>
                                </div>
                            </div>
                        </div>

                        <!-- Content Section -->
                        <div class="md:col-span-2">
                            <div class="mb-6">
                                <h3 class="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2">
                                    <i class="fas fa-file-alt text-blue-500"></i> 주요 상담 및 사례 내용
                                </h3>
                                <div class="bg-blue-50 p-6 rounded-2xl text-gray-700 leading-relaxed min-h-[200px]">
                                    ${item.주요내용.replace(/\n/g, '<br>')}
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div class="flex items-start gap-3">
                                    <div class="mt-1 text-green-500"><i class="fas fa-check-circle"></i></div>
                                    <p class="text-sm text-gray-600 font-medium">대상자 욕구 파악 완료</p>
                                </div>
                                <div class="flex items-start gap-3">
                                    <div class="mt-1 text-green-500"><i class="fas fa-check-circle"></i></div>
                                    <p class="text-sm text-gray-600 font-medium">지역 자원 연계 추진 중</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Initialize Slides
        container.innerHTML = createIntroSlide() + createDataSlides();
        const slides = document.querySelectorAll('.slide');

        function updateProgress() {
            const progress = (currentSlide / (slides.length - 1)) * 100;
            document.getElementById('progressInner').style.width = `${progress}%`;
        }

        function showSlide(index) {
            slides[currentSlide].classList.remove('active');
            currentSlide = index;
            slides[currentSlide].classList.add('active');
            updateProgress();
        }

        function nextSlide() {
            if (currentSlide < slides.length - 1) {
                showSlide(currentSlide + 1);
            } else {
                showSlide(0); // Loop to start
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                showSlide(currentSlide - 1);
            }
        }

        // Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });

    </script>
</body>
</html>
