<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4월의 재가장애인을 소개합니다</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f0f2f5;
            overflow: hidden;
        }

        .slide {
            display: none;
            height: 100vh;
            width: 100vw;
            animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slide.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .glass-card {
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .case-image-container {
            width: 100%;
            height: 100%;
            overflow: hidden;
            border-radius: 1.5rem;
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .case-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s ease;
        }

        .progress-bar {
            height: 6px;
            background: #e5e7eb;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 50;
        }

        .progress-inner {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #6366f1);
            transition: width 0.4s ease;
        }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            position: absolute;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #e5e7eb;
            border-radius: 10px;
        }

        .intro-slide-bg {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        .intro-overlay {
            background: rgba(0, 0, 0, 0.35); /* 사진의 분위기를 살리면서 글자가 보이도록 전체 톤 조절 */
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="progress-bar">
        <div id="progressInner" class="progress-inner" style="width: 0%"></div>
    </div>

    <!-- Navigation Buttons -->
    <div class="fixed bottom-10 right-10 flex gap-4 z-50">
        <button onclick="prevSlide()" class="w-14 h-14 rounded-full bg-white/20 shadow-xl flex items-center justify-center text-white hover:bg-white/40 transition-all active:scale-90 backdrop-blur-sm border border-white/30">
            <i class="fas fa-chevron-left text-xl"></i>
        </button>
        <button onclick="nextSlide()" class="w-14 h-14 rounded-full bg-blue-600 shadow-xl flex items-center justify-center text-white hover:bg-blue-700 transition-all active:scale-90">
            <i class="fas fa-chevron-right text-xl"></i>
        </button>
    </div>

    <div id="slideContainer"></div>

    <script>
        function formatDriveImageUrl(url) {
            if (!url || !url.includes('drive.google.com')) return 'https://via.placeholder.com/600x800?text=No+Image';
            const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
            if (match && match[1]) {
                return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w1200`;
            }
            return url;
        }

        const data = [
            {
                "연번": "1",
                "일자(시작)": "2026-04-03",
                "성명": "강연임",
                "나이": "83",
                "권역": "순창읍",
                "장애유형": "시각",
                "장애정도": "심하지 않은 장애",
                "주요내용": "영유아기 고열로 인한 시청각 장애와 고혈압 당뇨 치매 등 다수의 기저질환을 앓고 있음.\n하체 근력이 약해 낙상 위험이 매우 크며 화장실 내 안전손잡이 설치가 가장 시급한 상황임. 차상위계층으로 경제적 여유가 부족하며 현재 주 5일 요양보호사의 돌봄을 받고 있음. 최우선으로 화장실 안전손잡이를 지원하기로 함. 복지관 등록을 통해 정기적인 안전 모니터링 체계를 구축하고 추가 복지 혜택을 위한 장애 재판정을 제안함.",
                "이미지 URL": "https://drive.google.com/file/d/17ddmcu46S3G1tfT9PFDJ12ylPXxfqBgD/view?usp=drive_link"
            },
            {
                "연번": "2",
                "일자(시작)": "2026-04-03",
                "성명": "강갑순",
                "나이": "81",
                "권역": "인계면",
                "장애유형": "청각",
                "장애정도": "심한 장애",
                "주요내용": "일상생활은 가능하나 큰아들의 이혼 이후 손주 양육과 가사 부담이 함께 있어 신체적.정서적 부담이 큰 상황임. 가정편의시설설치는 자녀분이 해주기로 함. 만성질환과 고령으로 지속적인 모니터링 필요함",
                "이미지 URL": "https://drive.google.com/file/d/1BlS2CiHqsaxh1yF1rFWD7GVnJH3AZQVX/view?usp=drive_link"
            },
            {
                "연번": "3",
                "일자(시작)": "2026-04-07",
                "성명": "설영자",
                "나이": "83",
                "권역": "풍산면",
                "장애유형": "지체",
                "장애정도": "심하지 않은 장애",
                "주요내용": "거주 주택 내 날개미가 발생으로 심리적 불안과 스트레스를 호소하여\n사례회의를 통해 방역업체를 연계하여 방역을 1회 실시함\n또한 노후화된 주택으로 인해 난방 효율이 저하되어 난방비 부담이 과중한 상황으로 향후 난방비 지원 연계를 계획함. 최근 열효율개선사업 신청을 시도하였으나 토지는 배우자 명의이며 가건물로 분류되어 신청이 불가한 상태임. 추후 지속적인 모니터링 계획",
                "이미지 URL": "https://drive.google.com/file/d/1bPjyFF7De7rY-zoD0V2ibEF8IHKYBX3n/view?usp=drive_link"
            },
            {
                "연번": "4",
                "일자(시작)": "2026-04-17",
                "성명": "김명숙",
                "나이": "69",
                "권역": "유등면",
                "장애유형": "시각",
                "장애정도": "심하지 않은 장애",
                "주요내용": "전반적으로 건강 상태가 양호하며 시니어일자리 참여를 통해 규칙적인 일상생활을 유지하고 있음. 자녀들과의 교류 및 마을 주민들과의 관계도 유지되고 있어 사회적 고립 위험은 낮은 것으로 판단됨. \n특이한 문제는 확인되지 않음",
                "이미지 URL": "https://drive.google.com/file/d/1nsBPZSORK1D7S344eqiMobCdFPJzSOsB/view?usp=drive_link"
            },
            {
                "연번": "5",
                "일자(시작)": "2026-04-17",
                "성명": "김재곤",
                "나이": "79",
                "권역": "동계면",
                "장애유형": "지체",
                "장애정도": "심한 장애",
                "주요내용": "고혈압, 당뇨와 함께 하체 관절 통증으로 인해 보행에 어려움을 겪고 있음. 위암 완치 후 블루베리 농사를 계획할 정도로 근로 의욕과 삶에 대한 태도가 긍정적임. 다만 자가 주택과 토지 소유로 인해 기초생활수급자 선정에서 탈락하여 실제 경제적 형편이 매우 곤란한 상태임. 만성적인 통증 관리와 생활비 부족 문제를 해결하기 위해 복지관 이용을 통한 자원 연계를 추진하고 정기적인 안부 확인을 통해 지속적인 모니터링을 진행하기로 함.",
                "이미지 URL": "https://drive.google.com/file/d/1uH3BX5FShjWi7IU89AhTPNkndHHRO-rd/view?usp=drive_link"
            },
            {
                "연번": "6",
                "일자(시작)": "2026-04-17",
                "성명": "이경희",
                "나이": "63",
                "권역": "동계면",
                "장애유형": "지체",
                "장애정도": "심한 장애",
                "주요내용": "잦은 낙상 등 거동에 큰 불편을 겪고 있음. 아들이 부양의무자로 분류되어 공적 급여를 받지 못해 경제적 형편이 매우 어려우나, 깊은 신앙심을 바탕으로 긍정적인 삶의 태도를 유지하고 있음. 현재 가장 시급한 문제는 신체 기능 저하에도 불구하고 실외 화장실을 이용하고 있어 겨울철 낙상 등 안전사고 위험이 매우 높다는 점임. 안전한 주거 환경 조성을 위해 지자체 화장실 보수공사 지원 사업 등 최우선적인 자원 연계가 필요한 상황임.",
                "이미지 URL": "https://drive.google.com/file/d/1iOB51bWQ5hGBXIePkXHBW_kfWjnvhkfG/view?usp=drive_link"
            },
            {
                "연번": "7",
                "일자(시작)": "2026-04-17",
                "성명": "조삼순",
                "나이": "82",
                "권역": "동계면",
                "장애유형": "지체",
                "장애정도": "심하지 않은 장애",
                "주요내용": "척추 수술 이력과 만성질환으로 거동이 불편함. 경제적으로 여유가 있고 자녀들의 돌봄 지지체계가 강력하여 정서적 및 일상적으로 안정된 생활을 유지 중임. 현재 가장 시급한 문제는 안전사고 위험이 있는 현관 미닫이문 잠금장치 수리와 비상용 보행기 지원임. 주거 안전성을 높이기 위해 관련 자원 연계 가능성을 파악하고, 복지관 등록 후 정기적인 안부 전화로 지속적인 모니터링을 진행할 계획임.",
                "이미지 URL": "https://drive.google.com/file/d/1-DAqrHfUnyU6SD44R9-2v--8IAbWB5iP/view?usp=drive_link"
            },
            {
                "연번": "8",
                "일자(시작)": "2026-04-23",
                "성명": "김상기",
                "나이": "52",
                "권역": "쌍치면",
                "장애유형": "뇌전증",
                "장애정도": "심하지 않은 장애",
                "주요내용": "잦은 뇌전증 발작과 손가락 부상으로 인해 청결 관리나 가사 등 일상생활 전반에 큰 어려움을 겪고 있음. 공공부조로 경제적 곤란은 덜한 편이나 최근 모친상 이후 심리적 상실감과 외로움이 깊어진 상태임. 가사 지원을 위해 현재 장애인 활동지원서비스를 신청하고 결과를 기다리는 중임.",
                "이미지 URL": "https://drive.google.com/file/d/1W-Z0kA_4rn-Ohr_-78RjklJgZGHhpoVD/view?usp=drive_link"
            }
        ];

        let currentSlide = 0;
        const container = document.getElementById('slideContainer');

        function createIntroSlide() {
            const uniqueRegions = [...new Set(data.map(item => item.권역))].join(', ');
            const introBgUrl = formatDriveImageUrl("https://drive.google.com/file/d/1JDodT2o8SCluZlOagv3Dyo08wCPybHct/view?usp=sharing");

            return `
                <div class="slide active intro-slide-bg" style="background-image: url('${introBgUrl}');">
                    <div class="intro-overlay p-4 md:p-8">
                        <!-- 배경이 투명하게 보이도록 박스 배경색과 블러를 제거 -->
                        <div class="max-w-5xl w-full text-center relative overflow-hidden p-10 md:p-16">
                            <div class="relative z-10 text-white">
                                <span class="inline-block px-4 py-1.5 mb-6 text-sm font-bold tracking-widest text-blue-200 uppercase bg-black/20 rounded-full border border-white/20">April 2026 Monthly Report</span>
                                <h1 class="text-6xl md:text-8xl font-black mb-8 tracking-tighter text-white drop-shadow-2xl">
                                    4월의 재가장애인을<br>소개합니다.
                                </h1>
                                <p class="text-2xl md:text-3xl text-gray-100 mb-16 font-light leading-relaxed drop-shadow-lg">
                                    현장 방문을 통해 기록한 여덟 분의<br>따뜻한 동행과 맞춤형 지원 이야기
                                </p>
                                
                                <div class="flex flex-wrap justify-center gap-8 md:gap-16 pt-10 border-t border-white/30">
                                    <div class="text-center flex-1">
                                        <p class="text-xs text-blue-200 font-bold uppercase tracking-widest mb-2">Total Stories</p>
                                        <p class="text-4xl md:text-5xl font-black text-white drop-shadow-md">${data.length}<span class="text-2xl font-normal ml-1">명</span></p>
                                    </div>
                                    <div class="text-center flex-[2] border-x border-white/20 px-8">
                                        <p class="text-xs text-blue-200 font-bold uppercase tracking-widest mb-2">Visited Regions</p>
                                        <p class="text-xl md:text-2xl font-bold text-white leading-tight drop-shadow-md">${uniqueRegions}</p>
                                    </div>
                                    <div class="text-center flex-1">
                                        <p class="text-xs text-blue-200 font-bold uppercase tracking-widest mb-2">Period</p>
                                        <p class="text-3xl md:text-4xl font-black text-white tracking-tighter drop-shadow-md">2026. 04</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function createDataSlides() {
            return data.map((item, index) => `
                <div class="slide items-center justify-center p-4 md:p-8">
                    <div class="glass-card max-w-6xl w-full flex flex-col md:flex-row h-auto md:h-[750px] bg-white/95 shadow-2xl">
                        <!-- Image Area -->
                        <div class="md:w-5/12 bg-gray-50 p-6 flex flex-col">
                            <div class="case-image-container flex-grow shadow-inner">
                                <div class="loader"></div>
                                <img src="${formatDriveImageUrl(item["이미지 URL"])}" 
                                     alt="${item.성명} 현장" 
                                     class="case-image opacity-0 transition-opacity duration-500"
                                     onload="this.previousElementSibling.remove(); this.classList.remove('opacity-0')"
                                     onerror="handleImageError(this)">
                            </div>
                            <p class="mt-4 text-xs text-gray-400 text-center font-medium uppercase tracking-widest">Site Verification Photo</p>
                        </div>

                        <!-- Content Area -->
                        <div class="md:w-7/12 p-8 md:p-12 flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between items-start mb-8">
                                    <div>
                                        <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold mb-4 inline-block tracking-tighter uppercase">CASE #${item.연번}</span>
                                        <h2 class="text-4xl md:text-5xl font-black text-gray-800 tracking-tighter">${item.성명} <span class="text-2xl font-normal text-gray-300 ml-2">${item.나이}세</span></h2>
                                    </div>
                                    <div class="text-right">
                                        <div class="flex items-center justify-end gap-2 text-blue-600 font-black mb-1">
                                            <i class="fas fa-map-marker-alt"></i>
                                            <p class="text-2xl">${item.권역}</p>
                                        </div>
                                        <p class="text-gray-400 text-sm font-medium"><i class="far fa-calendar-alt mr-1"></i> ${item["일자(시작)"]}</p>
                                    </div>
                                </div>

                                <div class="grid grid-cols-2 gap-4 mb-10">
                                    <div class="bg-gray-50 p-5 rounded-3xl border border-gray-100 transition-colors hover:bg-white hover:border-blue-200">
                                        <p class="text-xs text-gray-400 font-bold uppercase mb-2">장애 유형</p>
                                        <p class="font-bold text-gray-800 text-lg">${item.장애유형}</p>
                                    </div>
                                    <div class="bg-gray-50 p-5 rounded-3xl border border-gray-100 transition-colors hover:bg-white hover:border-blue-200">
                                        <p class="text-xs text-gray-400 font-bold uppercase mb-2">장애 정도</p>
                                        <p class="font-bold text-gray-800 text-lg">${item.장애정도}</p>
                                    </div>
                                </div>

                                <div class="mb-4 h-[280px] overflow-hidden flex flex-col">
                                    <h3 class="text-sm font-bold text-gray-300 mb-4 flex items-center gap-2 uppercase tracking-widest">
                                        <i class="fas fa-file-signature text-blue-400"></i> 주요 상담 및 조치 내용
                                    </h3>
                                    <div class="text-gray-700 leading-relaxed text-xl bg-blue-50/30 p-8 rounded-[2rem] border border-blue-100/30 relative overflow-y-auto flex-grow custom-scrollbar">
                                        <i class="fas fa-quote-left absolute top-5 left-5 text-blue-100 text-3xl opacity-50"></i>
                                        <p class="relative z-10 font-medium italic">
                                            ${item.주요내용.replace(/\n/g, '<br>')}
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <div class="pt-6 border-t border-gray-100 flex items-center justify-between">
                                <div class="flex items-center gap-3 text-green-600 font-bold">
                                    <div class="w-8 h-8 rounded-full bg-green-50 flex items-center justify-center">
                                        <i class="fas fa-check text-sm"></i>
                                    </div>
                                    <span class="text-sm">종합 사례 검토 및 지원 연계 완료</span>
                                </div>
                                <span class="text-gray-300 text-sm font-mono font-bold tracking-widest">${index + 1} / ${data.length}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function handleImageError(img) {
            img.previousElementSibling?.remove();
            img.src = 'https://via.placeholder.com/600x800?text=이미지+로드+불가';
        }

        container.innerHTML = createIntroSlide() + createDataSlides();
        const slides = document.querySelectorAll('.slide');

        function updateProgress() {
            const progress = (currentSlide / (slides.length - 1)) * 100;
            document.getElementById('progressInner').style.width = `${progress}%`;
        }

        function showSlide(index) {
            slides[currentSlide].classList.remove('active');
            currentSlide = index;
            slides[currentSlide].classList.add('active');
            updateProgress();
        }

        function nextSlide() {
            if (currentSlide < slides.length - 1) showSlide(currentSlide + 1);
            else showSlide(0);
        }

        function prevSlide() {
            if (currentSlide > 0) showSlide(currentSlide - 1);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });
    </script>
</body>
</html>
